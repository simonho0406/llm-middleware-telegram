name: Build and publish Docker image

# Builds the production image off-server (the 2-vCPU hosts only PULL it) and pushes to
# GHCR. Both servers are x86_64, so a single linux/amd64 image serves both — no multi-arch.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # simonho0406/llm-middleware-telegram (lowercase)

jobs:
  build-and-push:
    runs-on: ubuntu-latest               # native amd64 runner — no QEMU emulation
    permissions:
      contents: read
      packages: write                    # push to GHCR via the built-in GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # CI builds from a clean git checkout (no OneDrive COPY-cache staleness), so the
          # sha just pins the code layer to this commit.
          build-args: |
            CACHEBUST=${{ github.sha }}
