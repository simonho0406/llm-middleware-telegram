services:
  llm-middleware-telegram:
    # Production servers PULL this pre-built image (built by CI, see
    # .github/workflows/docker-publish.yml):  docker compose pull && docker compose up -d
    # `build: .` is retained for LOCAL DEV only:  docker compose up --build
    image: ghcr.io/simonho0406/llm-middleware-telegram:latest
    # `up` ALWAYS pulls the prebuilt image and NEVER builds on the host. This is the guard
    # that stops a server from accidentally running the heavy apt+Node+pip build, which
    # pegs both vCPUs and OOM-locks a small box. Devs can still force a build: `up --build`.
    pull_policy: always
    build: . # dev only — servers must never run `--build`
    container_name: llm-middleware-telegram
    restart: unless-stopped
    # Block privilege escalation via setuid binaries (defense-in-depth around the LLM
    # tool loop / MCP subprocesses). The app itself runs as non-root 'appuser' (see
    # Dockerfile + docker-entrypoint.sh); only the brief entrypoint runs as root to fix
    # the bind-mounted data-dir ownership before dropping privileges via gosu.
    security_opt:
      - no-new-privileges:true
    # Cap log growth. Without this, an error storm (e.g. a duplicate-poller Conflict
    # loop) can produce an unbounded log — one outage wrote a 2 MB stream. 3×10 MB
    # is plenty for triage and bounds disk on a small VM.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env # Pass environment variables from .env file
    volumes:
      # Mount the config file (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Mount the data directory to persist session data
      - ./data:/app/data
    mem_limit: 768m        # measured runtime peak ~330 MB (bot + all 3 MCP servers); 768m
                           # fits with headroom AND stays safely under a 1 GB host.
                           # NEVER set above the host's physical RAM (that causes host OOM).
    memswap_limit: 768m    # = mem_limit ⇒ container can't swap; OOM kills the container
                           # cleanly (restart policy revives it) instead of thrashing the host.
                           # Still add a HOST swapfile so the OS/sshd survive any spike.
    cpus: "1.5"            # reserves 0.5 CPU for other programs
    # Optional: If you want the bot container to talk to an Ollama
    # container running on the host machine via Docker's network:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434

    # Optional: Uncomment to run Ollama service within docker-compose
    # depends_on:
    #   - ollama

  # Optional: Uncomment this section to run Ollama service alongside the bot
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama # Persist Ollama models
  #   restart: unless-stopped
  #   # Optional: Add GPU support if needed
  #   # deploy:
