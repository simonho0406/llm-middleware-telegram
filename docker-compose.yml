services:
  llm-middleware-telegram:
    # Production servers PULL this pre-built image (built by CI, see
    # .github/workflows/docker-publish.yml):  docker compose pull && docker compose up -d
    # `build: .` is retained for LOCAL DEV only:  docker compose up --build
    image: ghcr.io/simonho0406/llm-middleware-telegram:latest
    build: . # dev only — servers should never run `--build`
    container_name: llm-middleware-telegram
    restart: unless-stopped
    env_file:
      - .env # Pass environment variables from .env file
    volumes:
      # Mount the config file (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Mount the data directory to persist session data
      - ./data:/app/data
    mem_limit: 1.2g        # leaves ~800 MB for OS + other programs on a 2C2G host
    memswap_limit: 1.2g   # disables swap so OOM is clean rather than silently slow
    cpus: "1.5"           # reserves 0.5 CPU for other programs
    # Optional: If you want the bot container to talk to an Ollama
    # container running on the host machine via Docker's network:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434

    # Optional: Uncomment to run Ollama service within docker-compose
    # depends_on:
    #   - ollama

  # Optional: Uncomment this section to run Ollama service alongside the bot
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
