# =====================================
# LLM Middleware Telegram Bot Configuration
# Clean rebuild with verified free models (2025-09-20)
# =====================================

# --- Locale / Timezone ---
timezone:
  offset_hours: 8   # UTC+8 = Taiwan / China Standard Time
  label: "CST"      # Label shown to the model alongside the time

# --- Storage Backend ---
storage_backend: "database" # Options: "database", "file"

# --- Robustness harness ---
# Inactivity budget for a streaming chat turn. Resets on every token, so a
# healthy slow generation is never cut off; only a stalled stream (no output for
# this long) is aborted and surfaced to the user. Set 0 to disable.
generation_idle_timeout_seconds: 180

# On startup, take over the most recent message a prior (crashed/failed) session
# never answered. Telegram can't expose chat history, so this is DB-driven.
recovery:
  enabled: true
  window_seconds: 3600   # only resume stranded user messages newer than this (1h)

# --- Primary Provider Settings ---
default_provider: "nvidia"
default_ollama_model: "qwq"

# --- Gemini Configuration (Free Tier: 5 RPM / 25 RPD) ---
default_gemini_model: "gemini-1.5-flash-latest"  # Using flash for better free tier compatibility
max_output_tokens: 8192
gemini_ask_all_models:
  - "gemini-1.5-flash-latest"
  - "gemini-1.5-pro-latest"

# --- OpenRouter Configuration (Free Tier: 20 RPM / 1000 daily with $10 credit) ---
default_openrouter_model: "deepseek/deepseek-chat-v3.1:free"
openrouter_http_referer: "https://github.com/user/llm-middleware-telegram"
openrouter_allowed_models:
  # Verified working free models from OpenRouter API
  - "x-ai/grok-4-fast:free"                    # 2M context, multimodal
  - "openai/gpt-oss-120b:free"                 # 32K context, 117B MoE
  - "openai/gpt-oss-20b:free"                  # 131K context, 21B MoE
  - "deepseek/deepseek-chat-v3.1:free"         # 163K context, hybrid reasoning
  - "google/gemma-3n-e2b-it:free"              # 8K context, multimodal
  - "tencent/hunyuan-a13b-instruct:free"       # 32K context, CoT reasoning
  - "mistralai/mistral-small-3.2-24b:free"     # Good for general tasks

# --- System Configuration ---
session_file_path: "data/sessions.json"
REQUEST_TIMEOUT_SECONDS: 180
# Specific timeout for local Ollama to handle slow CPU inference
OLLAMA_REQUEST_TIMEOUT_SECONDS: 1200
default_max_context_tokens: 128000
context_token_output_buffer: 20000

# --- Custom OpenAI-Compatible Providers ---
#
# This section allows you to add any provider that uses the OpenAI API format.
# For each provider, you need to define its 'name', 'base_url', 'default_model',
# and the 'api_key' environment variable that holds the authentication token.
#
# The 'api_key' value should be the NAME of the environment variable you set in your .env file.
# For example, if you have 'CUSTOM_PROVIDER_API_KEY_GROQ' in your .env file, you would put:
#   api_key: "CUSTOM_PROVIDER_API_KEY_GROQ"
#
# The 'base_url' is the entry point for the provider's API.
#
custom_openai_providers:
  # Groq - Free tier with fast inference
  - name: "groq"
    base_url: "https://api.groq.com/openai/v1"
    api_key: "CUSTOM_PROVIDER_API_KEY_GROQ" # Matches the variable in .env.example
    default_model: "llama-3.3-70b-versatile"
    enable_streaming: true
    allowed_models:
      - "llama-3.3-70b-versatile"
      - "llama3-8b-8192"
      - "mixtral-8x7b-32768"
      - "gemma2-9b-it"

  # NVIDIA NIM - Free tier with 1000 credits
  - name: "nvidia"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: "CUSTOM_PROVIDER_API_KEY_NVIDIA" # Matches the variable in .env.example
    default_model: "nvidia/nemotron-3-nano-30b-a3b"
    enable_streaming: true  # Re-enabled via native Telegram Draft API
    allowed_models:
      - "nvidia/nemotron-3-nano-30b-a3b"
      - "nvidia/llama-3.3-nemotron-super-49b-v1.5"
      - "meta/llama3-70b-instruct"
      - "meta/llama3-8b-instruct"

  # --- Example of a disabled provider ---
  # - name: "anyscale"
  #   base_url: "https://api.endpoints.anyscale.com/v1"
  #   api_key: "CUSTOM_PROVIDER_API_KEY_ANYSCALE"
  #   default_model: "mistralai/Mixtral-8x7B-Instruct-v0.1"
  #   enabled: false # This provider will be ignored by the bot


# --- Expert Panel Configuration ---
expert_panel:
  # Enable/disable the advanced "Conversational Research" feature
  advanced_search_panel: false
  
  # Master & Apprentice Architecture Quality Settings
  quality_threshold: 85
  max_refinement_iterations: 4

  # Orchestrator (Project Manager) - Keep original working configuration
  orchestrator:
    provider: "nvidia"
    model: "nvidia/nemotron-3-super-120b-a12b"
    fallback_provider: "nvidia"
    fallback_model: "google/gemma-4-31b-it"
    request_timeout_seconds: 600

  # Expert Panel Roles - Restore original working models
  roles:
    Proposer:
      provider: "nvidia"
      model: "moonshotai/kimi-k2-thinking"
      fallback_provider: "nvidia"
      fallback_model: "openai/gpt-oss-120b"
      request_timeout_seconds: 600

    Critic:
      provider: "nvidia"
      model: "minimaxai/minimax-m2"
      request_timeout_seconds: 600

    Refiner:
      provider: "openrouter"
      model: "qwen/qwen3-coder:free"
      request_timeout_seconds: 600

# --- Web Search Configuration ---
web_search:
  manual_provider: "tavily"
  automated_provider: "google"

# --- Rate Limiting Configuration ---
# Conservative limits to respect free tier quotas
rate_limits:
  openrouter:
    requests_per_minute: 15  # Below 20 RPM limit
    daily_requests: 800      # Below 1000 daily limit

  gemini:
    requests_per_minute: 4   # Below 5 RPM limit
    daily_requests: 20       # Below 25 daily limit

  groq:
    requests_per_minute: 30  # Conservative for free tier

  nvidia:
    requests_per_minute: 10  # Conservative for credit usage

# --- Security and Access Control ---
# Uncomment and configure if needed
# allowed_chat_ids:
#   - 123456789
#   - -987654321

# --- Utility Agent Configuration ---
utility_agent:
  provider: "gemini"
  model: "gemini-1.5-flash-latest"

# --- Model Context Protocol (MCP) Servers ---
# Declares standard stdio-based MCP servers dynamically mounted at startup.
mcp_servers:
  - name: "sqlite-tools"
    command: "uvx"
    args: ["mcp-server-sqlite", "--db-path", "file:data/bot_sessions.db?mode=ro&uri=true"]
    transport: "stdio"
    panel_execution: true    # Read-only history queries permitted; write_query/create_table blocked by hooks
    pass_env: []             # sqlite-tools needs no API keys

  - name: "tavily-search"
    command: "npx"
    args: ["-y", "tavily-mcp"]
    transport: "stdio"
    panel_execution: true    # Web search allowed in panel Quality Gate
    pass_env: ["TAVILY_API_KEY"]

  - name: "notion-workspace"
    command: "npx"
    args: ["-y", "@notionhq/notion-mcp-server"]
    transport: "stdio"
    panel_execution: true    # Knowledge lookup allowed in panel Quality Gate
    pass_env: ["NOTION_TOKEN"]  # @notionhq/notion-mcp-server reads NOTION_TOKEN only (not NOTION_API_KEY / OPENAI_API_KEY)

